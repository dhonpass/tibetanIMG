<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LHA·SCAN — Tibetan Object Recognition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tibetan:wght@400;600;700&family=Orbitron:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04050A;
    --bg-2:#070A14;
    --cyan:#3EF1FF;
    --cyan-dim:rgba(62,241,255,0.35);
    --violet:#A06CFF;
    --magenta:#FF4FD8;
    --green:#3CFFA6;
    --panel:rgba(12,18,32,0.72);
    --panel-line:rgba(62,241,255,0.22);
    --text-soft:rgba(200,225,235,0.6);
    --text-dim:rgba(200,225,235,0.38);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:#E8F6FA;
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 16px 70px;
    position:relative;
    overflow-x:hidden;
  }

  /* background grid + glow */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(62,241,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(62,241,255,0.05) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 75%);
    pointer-events:none;
    z-index:0;
  }
  body::after{
    content:"";
    position:fixed;
    top:-20%; left:50%;
    width:900px; height:900px;
    transform:translateX(-50%);
    background:radial-gradient(circle, rgba(160,108,255,0.16), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  /* scanline flicker overlay */
  .scanlines{
    position:fixed; inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:50;
    mix-blend-mode:overlay;
  }

  header{
    text-align:center;
    max-width:620px;
    margin-bottom:30px;
    position:relative;
    z-index:1;
  }
  .tag-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:16px;
  }
  .tag-row .line{
    width:34px; height:1px;
    background:linear-gradient(90deg, transparent, var(--cyan));
  }
  .tag-row .line.r{ background:linear-gradient(90deg, var(--cyan), transparent); }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.32em;
    color:var(--cyan);
    text-transform:uppercase;
  }
  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    font-size:clamp(26px, 6vw, 42px);
    line-height:1.15;
    letter-spacing:0.01em;
    text-transform:uppercase;
    background:linear-gradient(135deg, #fff 30%, var(--cyan) 70%, var(--violet) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .sub{
    margin-top:14px;
    color:var(--text-soft);
    font-size:13px;
    line-height:1.7;
    letter-spacing:0.01em;
  }

  main{
    width:100%;
    max-width:460px;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  /* === HUD Scan frame (signature element) === */
  .scan-frame{
    width:270px;
    height:270px;
    position:relative;
    cursor:pointer;
    flex-shrink:0;
  }
  .corner{
    position:absolute;
    width:28px; height:28px;
    border:2px solid var(--cyan);
    opacity:0.85;
    filter:drop-shadow(0 0 4px var(--cyan-dim));
  }
  .corner.tl{ top:0; left:0; border-right:none; border-bottom:none; }
  .corner.tr{ top:0; right:0; border-left:none; border-bottom:none; }
  .corner.bl{ bottom:0; left:0; border-right:none; border-top:none; }
  .corner.br{ bottom:0; right:0; border-left:none; border-top:none; }

  .scan-stage{
    position:absolute;
    inset:14px;
    border-radius:6px;
    overflow:hidden;
    background:
      radial-gradient(circle at 30% 25%, rgba(160,108,255,0.10), transparent 55%),
      linear-gradient(180deg, rgba(8,12,22,0.9), rgba(4,5,10,0.95));
    border:1px solid var(--panel-line);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .scan-stage img{
    width:100%; height:100%; object-fit:cover;
  }
  .placeholder-icon{
    width:50px; height:50px;
    color:var(--cyan);
    opacity:0.6;
  }
  .reticle{
    position:absolute;
    width:46%; height:46%;
    border:1px dashed rgba(62,241,255,0.4);
    border-radius:50%;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
  }
  /* sweeping scan line, only animates while busy */
  .sweep{
    position:absolute;
    left:0; right:0;
    height:2px;
    top:0;
    background:linear-gradient(90deg, transparent, var(--cyan), var(--green), var(--cyan), transparent);
    box-shadow:0 0 12px var(--cyan), 0 0 24px var(--cyan-dim);
    opacity:0;
  }
  .scan-frame.busy .sweep{
    opacity:1;
    animation:sweep 1.6s linear infinite;
  }
  .scan-frame.busy .corner{ animation:pulseCorner 1.2s ease-in-out infinite; }
  @keyframes sweep{
    0%{ top:2%; }
    100%{ top:96%; }
  }
  @keyframes pulseCorner{
    0%,100%{ opacity:0.85; }
    50%{ opacity:0.35; }
  }

  .vf-label{
    position:absolute;
    bottom:-30px;
    left:50%; transform:translateX(-50%);
    font-size:10.5px;
    letter-spacing:0.18em;
    color:var(--text-dim);
    text-transform:uppercase;
    white-space:nowrap;
  }

  input[type=file]{ display:none; }

  .actions{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:12px 20px;
    border-radius:2px;
    border:1px solid var(--panel-line);
    background:rgba(62,241,255,0.04);
    color:#cfeff5;
    cursor:pointer;
    transition:all .2s ease;
    display:flex;
    align-items:center;
    gap:8px;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .btn:hover{ background:rgba(62,241,255,0.12); border-color:var(--cyan); box-shadow:0 0 14px rgba(62,241,255,0.18); }
  .btn.primary{
    background:linear-gradient(135deg, rgba(160,108,255,0.25), rgba(62,241,255,0.18));
    border-color:var(--violet);
    color:#fff;
  }
  .btn.primary:hover{ box-shadow:0 0 18px rgba(160,108,255,0.35); }
  .btn svg{ width:14px; height:14px; }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .status{
    min-height:18px;
    font-size:11.5px;
    color:var(--cyan);
    text-align:center;
    letter-spacing:0.08em;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .status .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px var(--cyan);
    animation:blink 1s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  .error{
    color:var(--magenta);
    font-size:12px;
    text-align:center;
    max-width:380px;
    letter-spacing:0.04em;
  }

  /* result panel */
  .result-card{
    width:100%;
    background:var(--panel);
    backdrop-filter:blur(14px);
    border:1px solid var(--panel-line);
    border-radius:4px;
    padding:0;
    opacity:0;
    transform:translateY(16px);
    transition:opacity .5s ease, transform .5s ease;
    position:relative;
    overflow:hidden;
    clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
  }
  .result-card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:2px;
    background:linear-gradient(90deg, var(--violet), var(--cyan), var(--green));
  }
  .result-card.show{ opacity:1; transform:translateY(0); }

  .result-inner{ padding:26px 24px 24px; }

  .result-eyebrow{
    font-size:10px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--cyan);
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .result-eyebrow::before{
    content:"";
    width:14px; height:1px;
    background:var(--cyan);
  }

  .tibetan-word{
    font-family:'Noto Serif Tibetan', serif;
    font-size:clamp(34px, 9vw, 44px);
    color:#fff;
    line-height:1.3;
    margin-bottom:6px;
    text-shadow:0 0 18px rgba(62,241,255,0.35);
  }
  .translit{
    font-family:'JetBrains Mono', monospace;
    font-style:normal;
    font-size:13px;
    letter-spacing:0.04em;
    color:var(--violet);
    margin-bottom:18px;
  }
  .divider{
    height:1px;
    background:linear-gradient(90deg, var(--panel-line), transparent);
    margin:18px 0;
  }
  .english-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:10px;
    flex-wrap:wrap;
    gap:8px;
  }
  .english-name{
    font-family:'Orbitron', sans-serif;
    font-size:18px;
    font-weight:600;
    letter-spacing:0.02em;
    text-transform:uppercase;
    color:#fff;
  }
  .confidence{
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:4px 9px;
    border:1px solid var(--green);
    color:var(--green);
    border-radius:2px;
  }
  .description{
    font-size:13px;
    line-height:1.7;
    color:var(--text-soft);
    letter-spacing:0.01em;
  }

  footer{
    margin-top:46px;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    text-align:center;
    position:relative; z-index:1;
  }

  @media (max-width:380px){
    .scan-frame{ width:230px; height:230px; }
  }
</style>
</head>
<body>
<div class="scanlines"></div>

<header>
  <div class="tag-row"><span class="line"></span><span class="eyebrow">Object Recognition · 藏文 / བོད་ཡིག</span><span class="line r"></span></div>
  <h1>LHA·SCAN</h1>
  <p class="sub">Aim, capture, decode — every object in your world named in Tibetan script, with live pronunciation and meaning.</p>
</header>

<main>
  <div class="scan-frame" id="scanFrame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-stage" id="scanStage">
      <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M4 7a2 2 0 012-2h2l1.5-2h5L16 5h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/>
        <circle cx="12" cy="13" r="3.5"/>
      </svg>
      <div class="reticle"></div>
      <div class="sweep"></div>
    </div>
    <div class="vf-label">tap to initiate scan</div>
  </div>

  <div class="actions">
    <label class="btn primary" for="cameraInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7a2 2 0 012-2h2l1.5-2h5L16 5h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/><circle cx="12" cy="13" r="3.5"/></svg>
      Capture
    </label>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">

    <label class="btn" for="uploadInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/></svg>
      Upload
    </label>
    <input type="file" id="uploadInput" accept="image/*">
  </div>

  <div class="status" id="status"></div>

  <div class="result-card" id="resultCard">
    <div class="result-inner">
      <div class="result-eyebrow">Decoded Output</div>
      <div class="tibetan-word" id="tibetanWord">—</div>
      <div class="translit" id="translit">—</div>
      <div class="divider"></div>
      <div class="english-row">
        <div class="english-name" id="englishName">—</div>
        <div class="confidence" id="confidence"></div>
      </div>
      <div class="description" id="description"></div>
    </div>
  </div>
</main>

<footer>LHA·SCAN // Tibetan Object Recognition Engine</footer>

<script>
const scanFrame = document.getElementById('scanFrame');
const scanStage = document.getElementById('scanStage');
const status = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const cameraInput = document.getElementById('cameraInput');
const uploadInput = document.getElementById('uploadInput');

scanFrame.addEventListener('click', () => uploadInput.click());

[cameraInput, uploadInput].forEach(input => {
  input.addEventListener('change', handleFile);
});

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setStatus(text, isError){
  if(isError){
    status.innerHTML = `<span class="error">${text}</span>`;
  } else if(text){
    status.innerHTML = `<span class="dot"></span><span>${text}</span>`;
  } else {
    status.innerHTML = '';
  }
}

async function handleFile(e){
  const file = e.target.files[0];
  if(!file) return;

  resultCard.classList.remove('show');
  setStatus('');

  const url = URL.createObjectURL(file);
  scanStage.innerHTML = `<img src="${url}" alt="captured photo"><div class="reticle"></div><div class="sweep"></div>`;
  scanFrame.classList.add('busy');
  setStatus('Analyzing target...');

  try{
    const mediaType = file.type || 'image/jpeg';
    const base64Data = await fileToBase64(file);

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 500,
        messages: [
          {
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: mediaType, data: base64Data }
              },
              {
                type: "text",
                text: "Identify the single main object in this photo. Respond ONLY with raw JSON (no markdown fences, no preamble) in this exact shape: {\"english\":\"<object name in English, capitalized>\",\"tibetan\":\"<object name translated into Tibetan script (Uchen)>\",\"transliteration\":\"<Wylie or phonetic transliteration of the Tibetan word>\",\"description\":\"<one short, warm sentence (max 25 words) about the object, in English>\",\"confidence\":\"<High, Medium, or Low>\"}"
              }
            ]
          }
        ]
      })
    });

    const data = await response.json();
    const textBlock = data.content.find(c => c.type === 'text');
    if(!textBlock) throw new Error('No response');

    let clean = textBlock.text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('tibetanWord').textContent = parsed.tibetan || '—';
    document.getElementById('translit').textContent = parsed.transliteration ? `/ ${parsed.transliteration} /` : '';
    document.getElementById('englishName').textContent = parsed.english || '—';
    document.getElementById('confidence').textContent = parsed.confidence ? `${parsed.confidence}` : '';
    document.getElementById('description').textContent = parsed.description || '';

    setStatus('Decode complete');
    resultCard.classList.add('show');

  }catch(err){
    console.error(err);
    setStatus('Scan failed — target not recognized. Try again.', true);
  }finally{
    scanFrame.classList.remove('busy');
  }
}
</script>

</body>
</html>
